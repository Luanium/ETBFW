model_type = "jancu1998"

# J.-M. Jancu, R. Scholz, F. Beltram, F. Bassani, Phys. Rev. B 57, 6493 (1998).
# Table II (C, Si, Ge), Table III (AlP, GaP, InP, AlAs, GaAs, InAs, AlSb, GaSb, InSb).
#
# Top-level concept is the PAIR, not "material": each [X_Y] block carries
# its own onsite parameters for X and Y (since onsite energies are pair-context
# dependent), plus the pair's hopping table, plus the pair's lattice_constant,
# d0 (nearest-neighbor bond length) and cutoff. This lets a single unit cell
# mix multiple pairs (e.g. Ga-As, In-P, Ga-P, In-As for a quaternary alloy)
# without any artificial "material" grouping.
#
# i_jk(d) = V0 * (d0/d)^eta   (Eq. 40), d0 = a*sqrt(3)/4.
#
# Coupling field naming: "<orb1><orb2><bond>" where orb1 is the orbital on the
# first species of the pair (X), orb2 the orbital on the second species (Y),
# and <bond> in {s,p,d} = sigma/pi/delta. s* is written "e". Examples:
#   sss = s-s sigma
#   sps = s(X)-p(Y) sigma ; pss = p(X)-s(Y) sigma
#   ees = e-e sigma (s*-s* sigma)
#   ses = s(X)-e(Y) sigma ; ess = e(X)-s(Y) sigma
#   eps = e(X)-p(Y) sigma ; pes = p(X)-e(Y) sigma
#   sds = s(X)-d(Y) sigma ; dss = d(X)-s(Y) sigma
#   eds = e(X)-d(Y) sigma ; des = d(X)-e(Y) sigma
#   pps, ppp, pds, dps, pdp, dpp, dds, ddp, ddd as usual.
#
# Table IX exponents: n_ees = n_ses = n_ess = 0 fixed;
# n_dds = n_ddp = n_ddd = n_eds = n_des = 2 fixed;
# sss, sps, pps, ppp, sds, eps, pds, pdp tabulated per pair.
# Carbon (C_C): not tabulated in Table IX -> all non-fixed exponents set to 2.0000.

