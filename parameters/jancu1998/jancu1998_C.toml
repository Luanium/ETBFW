model_type = "jancu1998"

# Jancu, Scholz, Beltram, Bassani, Phys. Rev. B 57, 6493 (1998), Table II.
# Nonpolar (group-IV) material: sublattice a and c are chemically identical.
lattice_constant = 3.5668   # Angstrom, room temperature
cutoff = 2.7                # Angstrom, nearest-neighbor only (bond length ~1.545 A)

[onsite.a]
Es = -1.0458
Ep = 7.0850
Ed = 27.9267
Esstar = 38.2661
delta3 = 0.0     # Delta/3, spin-orbit parameter for the p shell

[onsite.c]
Es = -1.0458
Ep = 7.0850
Ed = 27.9267
Esstar = 38.2661
delta3 = 0.0

# Two-center Slater-Koster integrals for the a->c bond, in eV.
# Naming: sps = <s_a|H|p_c>, pss = <p_a|H|s_c>, sSss = <s*_a|H|s_c>,
# sssS = <s_a|H|s*_c>, sSps = <s*_a|H|p_c>, psSs = <p_a|H|s*_c>,
# sds = <s_a|H|d_c>, dss = <d_a|H|s_c>, sSds = <s*_a|H|d_c>, dsSs = <d_a|H|s*_c>,
# pds = <p_a|H|d_c>, dps = <d_a|H|p_c>.
# For nonpolar materials the paper's parameter set is direction-symmetric
# (a<->c identical species), so reverse-direction integrals equal the
# forward ones: pss=sps, dss=sds, dps=pds, dpp=pdp, sssS=sSss, psSs=sSps, dsSs=sSds.
[hopping]
sss   = -4.3882
sps   = 5.4951
pss   = 5.4951
sSss  = -2.3899
sssS  = -2.3899
sSsSs = -2.6737
sSps  = 5.1709
psSs  = 5.1709
pps   = 7.5480
ppp   = -2.6363
sds   = -2.7655
dss   = -2.7655
sSds  = -2.3034
dsSs  = -2.3034
pds   = -2.1621
dps   = -2.1621
pdp   = 3.9281
dpp   = 3.9281
dds   = -4.1813
ddp   = 4.9779
ddd   = -3.9884
